<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoChecker — Fiche Lot — Design Proposals</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Nunito Sans','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
<script src="https://unpkg.com/@phosphor-icons/web@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07070a;color:#fff;font-family:'Nunito Sans',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
.shell{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;backdrop-filter:blur(24px) saturate(1.6);background:rgba(7,7,10,.78);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 28px;gap:8px}
.shell-brand{font-weight:700;font-size:14px;letter-spacing:-.03em;display:flex;align-items:center;gap:10px;margin-right:20px}
.shell-brand .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#2d526c,#3a6d8e);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.sep{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 8px}
.label{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.06em;text-transform:uppercase;font-weight:700;margin-right:6px}
.tab-group{display:flex;gap:3px;padding:3px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04)}
.tab{height:34px;padding:0 16px;border:none;background:transparent;color:rgba(255,255,255,.3);font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .25s;font-family:inherit;display:flex;align-items:center;gap:8px;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.5);background:rgba(255,255,255,.03)}
.tab.on{color:#fff;background:rgba(255,255,255,.1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tab .dot{width:7px;height:7px;border-radius:2.5px;flex-shrink:0}
.pane{display:none;padding:72px 24px 32px;animation:up .45s cubic-bezier(.16,1,.3,1)}.pane.on{display:block}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.frame{border-radius:16px;overflow:hidden;box-shadow:0 4px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);max-width:1440px;margin:0 auto;position:relative;background:#f8f9fb}
.frame::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08) 30%,rgba(255,255,255,.08) 70%,transparent);z-index:1}
.inner{font-family:'Nunito Sans',sans-serif;color:#1a1a2e;min-height:780px;display:flex}
.sb{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #f0f0f3;padding:14px 8px;display:flex;flex-direction:column;gap:1px}
.sb-h{padding:6px 10px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
.sb-h .ico{width:26px;height:26px;border-radius:7px;background:#2d526c;display:flex;align-items:center;justify-content:center}
.sb-sec{padding:0 10px;margin-top:14px;margin-bottom:4px;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:#b0b4c0}
.sb a{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;font-weight:500;text-decoration:none;color:#8b8fa4;border-radius:7px;cursor:pointer;transition:.15s}
.sb a:hover{background:rgba(45,82,108,.04);color:#5b6178}
.sb a.on{background:rgba(45,82,108,.07);color:#2d526c;font-weight:600}
.sb a i{font-size:15px;width:16px;text-align:center}
.main{flex:1;padding:28px 32px;overflow-y:auto;background:#f8f9fb}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 20px rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.04);overflow:hidden}
.card-head{display:flex;align-items:center;gap:10px;padding:18px 24px;cursor:pointer;transition:background .15s}
.card-head:hover{background:rgba(0,0,0,.01)}
.card-head i{font-size:17px;color:#8b8fa4}
.card-head span{font-size:14px;font-weight:700;color:#1a1a2e}
.card-head .caret{margin-left:auto;font-size:14px;color:#c0c4d0}
.card-body{padding:4px 24px 20px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:650}
.pill-blue{background:#dbeafe;color:#1d4ed8}.pill-green{background:#dcfce7;color:#15803d}
.pill-amber{background:#fef3c7;color:#b45309}.pill-red{background:#fee2e2;color:#dc2626}
.pill-sky{background:#e0f2fe;color:#0369a1}.pill-violet{background:#ede9fe;color:#6d28d9}
.pill-slate{background:#f1f5f9;color:#475569}
.avatar{display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn-primary{background:#2d526c;color:#fff}.btn-outline{background:#fff;color:#475569;border:1px solid #e2e4e8}
.btn-destructive{background:#fff;color:#dc2626;border:1px solid rgba(220,38,38,.2)}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f5f5f8}
.field-row:last-child{border-bottom:none}
.field-label{font-size:13px;color:#8b8fa4;font-weight:500}
.field-value{font-size:14px;font-weight:600;color:#1a1a2e}
.person-row{display:flex;align-items:center;gap:12px;padding:11px 0}
.person-row:not(:last-child){border-bottom:1px solid #f5f5f8}
.link-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;background:#f8f9fb;cursor:pointer;border:1px solid transparent;transition:.15s}
.link-card:hover{border-color:rgba(45,82,108,.15)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;font-weight:600;color:#8b8fa4;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #f0f0f3}
.tbl td{padding:11px 12px;border-bottom:1px solid #f8f8fa}
.tbl tr:hover td{background:#fafbfc}
.dpe-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-weight:800;font-size:14px}
</style>
</head>
<body>

<div class="shell">
  <div class="shell-brand"><div class="logo"><i class="ph-fill ph-buildings" style="font-size:13px"></i></div>ImmoChecker</div>
  <div class="sep"></div>
  <span class="label">Fiche Lot</span>
  <div class="tab-group">
    <button class="tab on" onclick="sw(0,this)"><span class="dot" style="background:#2d526c"></span>A — Wide Split</button>
    <button class="tab" onclick="sw(1,this)"><span class="dot" style="background:#3b82f6"></span>B — Sidebar Summary</button>
    <button class="tab" onclick="sw(2,this)"><span class="dot" style="background:#0d9488"></span>C — Dense Grid</button>
  </div>
</div>

<div id="root"></div>

<script>
function sidebar(){
  return `<div class="sb">
    <div class="sb-h"><div class="ico"><i class="ph-fill ph-buildings" style="font-size:12px;color:#fff"></i></div>ImmoChecker</div>
    <div class="sb-sec">Opérationnel</div>
    <a><i class="ph ph-squares-four"></i>Tableau de bord</a>
    <a><i class="ph ph-clipboard-text"></i>Missions</a>
    <div class="sb-sec">Référentiel</div>
    <a class="on"><i class="ph ph-building-office"></i>Parc immobilier</a>
    <a><i class="ph ph-users-three"></i>Tiers</a>
    <div style="flex:1"></div>
    <a style="opacity:.5"><i class="ph ph-gear-six"></i>Paramètres</a>
  </div>`;
}

function heroLot(){
  return `<div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
    <div style="padding:24px 28px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:flex;align-items:center;justify-content:center"><i class="ph ph-building-apartment" style="font-size:22px;color:#2563eb"></i></div>
            <div>
              <h1 style="font-size:22px;font-weight:800;letter-spacing:-.03em;color:#0f172a">Appartement T3 — Lot 302</h1>
              <div style="display:flex;gap:6px;margin-top:5px">
                <span class="pill pill-blue">Appartement</span>
                <span class="pill pill-green">Meublé</span>
                <span class="pill pill-slate">3ème étage</span>
              </div>
            </div>
          </div>
          <div style="display:flex;gap:20px;margin-top:10px;font-size:13px;color:#8b8fa4">
            <span style="display:flex;align-items:center;gap:6px"><i class="ph-duotone ph-building-office" style="font-size:16px;opacity:.5"></i>Résidence Victor Hugo</span>
            <span style="display:flex;align-items:center;gap:6px"><i class="ph-duotone ph-map-pin" style="font-size:16px;opacity:.5"></i>12 rue Victor Hugo, 75016 Paris</span>
            <span style="display:flex;align-items:center;gap:6px"><i class="ph-duotone ph-ruler" style="font-size:16px;opacity:.5"></i>67 m² · 3 pièces</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn btn-outline"><i class="ph ph-pencil-simple" style="font-size:14px"></i>Modifier</button>
          <button class="btn btn-destructive"><i class="ph ph-archive" style="font-size:14px"></i>Archiver</button>
        </div>
      </div>
    </div>
  </div>`;
}

function infosCard(){
  return `<div class="card-head"><i class="ph ph-list-dashes"></i><span>Informations</span><i class="ph ph-caret-up caret"></i></div>
  <div class="card-body">
    <div class="field-row"><span class="field-label">Désignation</span><span class="field-value">Appartement T3 — Lot 302</span></div>
    <div class="field-row"><span class="field-label">Référence libre</span><span class="field-value" style="font-family:'JetBrains Mono',monospace;font-size:13px">BAIL-2025-0302</span></div>
    <div class="field-row"><span class="field-label">Type de bien</span><span class="field-value">Appartement</span></div>
    <div class="field-row"><span class="field-label">Étage</span><span class="field-value">3ème</span></div>
    <div class="field-row"><span class="field-label">Emplacement</span><span class="field-value">Porte de gauche</span></div>
    <div class="field-row"><span class="field-label">Surface</span><span class="field-value">67 m²</span></div>
    <div class="field-row"><span class="field-label">Pièces</span><span class="field-value">3</span></div>
    <div class="field-row"><span class="field-label">Meublé</span><span class="field-value" style="color:#16a34a">Oui</span></div>
    <div class="field-row"><span class="field-label">Commentaire</span><span style="font-size:13px;color:#64748b">Rénovation cuisine prévue T3 2026</span></div>
  </div>`;
}

function energieCard(){
  return `<div class="card-head"><i class="ph ph-lightning"></i><span>Énergie & Annexes</span><i class="ph ph-caret-up caret"></i></div>
  <div class="card-body">
    <div class="field-row"><span class="field-label">DPE</span><span class="dpe-badge" style="background:#dcfce7;color:#15803d">C</span></div>
    <div class="field-row"><span class="field-label">GES</span><span class="dpe-badge" style="background:#fef3c7;color:#b45309">D</span></div>
    <div class="field-row"><span class="field-label">Chauffage</span><span class="field-value">Électrique · Individuel</span></div>
    <div class="field-row"><span class="field-label">Eau chaude</span><span class="field-value">Gaz · Collectif</span></div>
    <div class="field-row"><span class="field-label">N° Cave</span><span class="field-value">C-14</span></div>
    <div class="field-row"><span class="field-label">N° Parking</span><span class="field-value">P-302</span></div>
  </div>`;
}

function tiersCard(){
  return `<div class="card-head"><i class="ph ph-users-three"></i><span>Tiers liés</span><i class="ph ph-caret-up caret"></i></div>
  <div class="card-body">
    <div class="person-row"><div class="avatar" style="width:40px;height:40px;background:#e0f2fe;color:#0369a1;font-size:14px">JD</div><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#0f172a">Jean Dupont</div><div style="font-size:12px;color:#8b8fa4">Propriétaire · 06 12 34 56 78</div></div><span class="pill pill-sky" style="font-size:10px">Principal</span><i class="ph ph-arrow-square-out" style="font-size:13px;color:#8b8fa4;opacity:.3;cursor:pointer"></i></div>
    <div class="person-row"><div class="avatar" style="width:40px;height:40px;background:#ede9fe;color:#6d28d9;font-size:14px">MD</div><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#0f172a">Marie Dupont</div><div style="font-size:12px;color:#8b8fa4">Propriétaire (indivision)</div></div><i class="ph ph-arrow-square-out" style="font-size:13px;color:#8b8fa4;opacity:.3;cursor:pointer"></i></div>
    <div style="border-top:1px solid #f0f0f3;margin:6px 0"></div>
    <div class="person-row"><div class="avatar" style="width:40px;height:40px;background:#fae8ff;color:#a21caf;font-size:14px">IG</div><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#0f172a">Immo Gestion SARL</div><div style="font-size:12px;color:#8b8fa4">Mandataire · 01 23 45 67 89</div></div><i class="ph ph-arrow-square-out" style="font-size:13px;color:#8b8fa4;opacity:.3;cursor:pointer"></i></div>
    <div style="border-top:1px solid #f0f0f3;margin:6px 0"></div>
    <div class="person-row"><div class="avatar" style="width:40px;height:40px;background:#dcfce7;color:#15803d;font-size:14px">PL</div><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#0f172a">Pierre Leroy</div><div style="font-size:12px;color:#8b8fa4">Dernier locataire · Entrée 15/03/2026</div></div><span style="font-size:10px;padding:3px 10px;border-radius:20px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;font-weight:600">Informatif</span></div>
  </div>`;
}

function batimentCard(){
  return `<div class="card-head"><i class="ph ph-building-office"></i><span>Bâtiment parent</span><i class="ph ph-caret-up caret"></i></div>
  <div class="card-body">
    <div class="link-card">
      <div style="width:44px;height:44px;border-radius:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center"><i class="ph ph-building-office" style="font-size:20px;color:#475569"></i></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700;color:#0f172a">Résidence Victor Hugo</div><div style="font-size:12px;color:#8b8fa4">12 rue Victor Hugo, 75016 Paris</div></div>
      <i class="ph ph-arrow-square-out" style="font-size:14px;color:#8b8fa4;opacity:.4"></i>
    </div>
  </div>`;
}

function missionsCard(){
  return `<div class="card-head"><i class="ph ph-clipboard-text"></i><span>Missions</span><span style="margin-left:6px;background:#dbeafe;color:#1d4ed8;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:700">4</span><i class="ph ph-caret-up caret"></i></div>
  <div style="padding:0 4px 4px">
    <table class="tbl"><thead><tr><th>Référence</th><th>Date</th><th>Type</th><th>Technicien</th><th>Statut</th><th></th></tr></thead>
    <tbody>
      <tr><td style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px">M-2026-0042</td><td>11/04/2026</td><td><span style="padding:2px 8px;border-radius:6px;background:#dbeafe;color:#1d4ed8;font-size:10px;font-weight:600">Entrée</span></td><td>Lucas Martin</td><td><span class="pill pill-green" style="font-size:10px">Terminée</span></td><td><i class="ph ph-file-pdf" style="font-size:15px;color:#dc2626;cursor:pointer"></i></td></tr>
      <tr><td style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px">M-2026-0038</td><td>05/04/2026</td><td><span style="padding:2px 8px;border-radius:6px;background:#ffedd5;color:#c2410c;font-size:10px;font-weight:600">Sortie</span></td><td>Lucas Martin</td><td><span class="pill pill-green" style="font-size:10px">Terminée</span></td><td><i class="ph ph-file-pdf" style="font-size:15px;color:#dc2626;cursor:pointer"></i></td></tr>
      <tr><td style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px">M-2026-0051</td><td>18/04/2026</td><td><span style="padding:2px 8px;border-radius:6px;background:#dbeafe;color:#1d4ed8;font-size:10px;font-weight:600">Entrée</span></td><td>Sophie Petit</td><td><span class="pill pill-sky" style="font-size:10px">Planifiée</span></td><td></td></tr>
      <tr><td style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px">M-2026-0023</td><td>20/03/2026</td><td><span style="padding:2px 8px;border-radius:6px;background:#fef3c7;color:#92400e;font-size:10px;font-weight:600">Inventaire</span></td><td>Marc Durand</td><td><span class="pill pill-green" style="font-size:10px">Terminée</span></td><td><i class="ph ph-file-pdf" style="font-size:15px;color:#dc2626;cursor:pointer"></i></td></tr>
    </tbody></table>
  </div>`;
}

function commentCard(){
  return `<div class="card-head"><i class="ph ph-chat-text"></i><span>Commentaire</span><i class="ph ph-caret-up caret"></i></div>
  <div class="card-body">
    <div style="background:#f8f9fb;border:1px solid #e8eaef;border-radius:12px;padding:14px 18px;font-size:14px;color:#475569;line-height:1.7">Rénovation cuisine prévue T3 2026. Appartement en bon état général, quelques traces d'usure normale au sol du séjour.</div>
  </div>`;
}

function metaLine(){
  return `<div style="padding:4px 0;font-size:12px;color:#b0b4c0;display:flex;gap:16px"><span>Créé le 15/01/2026</span><span>Modifié le 10/04/2026</span></div>`;
}

/* ═══════════════════════════════════════════ */
/* A — Wide Split (same philosophy as mission) */
/* Row 1: Infos | Énergie+Annexes            */
/* Row 2: Bâtiment | Tiers                   */
/* Row 3: Missions (full width)              */
/* ═══════════════════════════════════════════ */
function proposalA(){
  return `<div class="frame"><div class="inner">${sidebar()}<div class="main">
    ${heroLot()}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">${infosCard()}</div>
      <div class="card">${energieCard()}
        <!-- Bâtiment inside same card -->
        <div style="border-top:1px solid #f0f0f3;margin-top:8px"></div>
        ${batimentCard()}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">${tiersCard()}</div>
      <div class="card">${commentCard()}</div>
    </div>
    <div class="card" style="margin-bottom:12px">${missionsCard()}</div>
    ${metaLine()}
  </div></div></div>`;
}

/* ═══════════════════════════════════════════ */
/* B — Sidebar Summary (right panel with     */
/*     quick stats, left with all content)   */
/* ═══════════════════════════════════════════ */
function proposalB(){
  return `<div class="frame"><div class="inner">${sidebar()}<div class="main">
    ${heroLot()}
    <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
      <!-- LEFT: all content -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">${infosCard()}</div>
        <div class="card">${tiersCard()}</div>
        <div class="card">${missionsCard()}</div>
      </div>
      <!-- RIGHT: summary sidebar -->
      <div style="display:flex;flex-direction:column;gap:14px">
        <!-- Quick stats -->
        <div class="card" style="padding:20px 22px">
          <div style="font-size:11px;font-weight:700;color:#8b8fa4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Résumé</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div style="text-align:center;padding:14px 0;background:#f8f9fb;border-radius:10px"><div style="font-size:24px;font-weight:800;color:#0f172a">67</div><div style="font-size:11px;color:#8b8fa4;margin-top:3px">m²</div></div>
            <div style="text-align:center;padding:14px 0;background:#f8f9fb;border-radius:10px"><div style="font-size:24px;font-weight:800;color:#0f172a">3</div><div style="font-size:11px;color:#8b8fa4;margin-top:3px">pièces</div></div>
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
            <span class="dpe-badge" style="background:#dcfce7;color:#15803d">C</span>
            <span class="dpe-badge" style="background:#fef3c7;color:#b45309">D</span>
          </div>
          <div style="margin-top:10px;font-size:11px;color:#8b8fa4;text-align:center">DPE / GES</div>
        </div>
        <!-- Énergie -->
        <div class="card">${energieCard()}</div>
        <!-- Bâtiment -->
        <div class="card">${batimentCard()}</div>
        <!-- Comment -->
        <div class="card">${commentCard()}</div>
        <!-- Actions -->
        <div class="card" style="padding:16px 20px">
          <button class="btn btn-primary" style="width:100%;justify-content:center"><i class="ph ph-plus" style="font-size:13px"></i>Créer une mission</button>
        </div>
        ${metaLine()}
      </div>
    </div>
  </div></div></div>`;
}

/*     then Tiers | Missions side-by-side)   */
/* ═══════════════════════════════════════════ */

const panels=[proposalA,proposalB,proposalC];
const root=document.getElementById('root');
panels.forEach((fn,i)=>{const p=document.createElement('div');p.className='pane'+(i===0?' on':'');p.innerHTML=fn();root.appendChild(p)});
function sw(idx,btn){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));root.children[idx].classList.add('on');btn.classList.add('on')}
</script>
