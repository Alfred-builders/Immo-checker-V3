<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoChecker — Dashboard Theme Proposals</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Montserrat:wght@300..800&family=Open+Sans:wght@300..800&family=Outfit:wght@200..700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#07070a;color:#fff;overflow-x:hidden}

/* ── Shell ── */
.shell-bar{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;backdrop-filter:blur(24px) saturate(1.6);background:rgba(7,7,10,0.82);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;padding:0 28px;gap:6px}
.shell-logo{font-weight:700;font-size:14px;letter-spacing:-0.03em;display:flex;align-items:center;gap:10px;margin-right:28px}
.shell-logo .ico{width:26px;height:26px;border-radius:7px;background:#2d526c;display:flex;align-items:center;justify-content:center}
.pill{height:34px;padding:0 16px;border:none;background:transparent;color:rgba(255,255,255,0.35);font-size:12.5px;font-weight:550;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:8px;transition:all .2s;font-family:inherit}
.pill:hover{color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.04)}
.pill.on{color:#fff;background:rgba(255,255,255,0.08)}
.pill .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── Panels ── */
.panel{display:none;padding:72px 28px 28px;animation:fadeUp .45s cubic-bezier(.16,1,.3,1)}
.panel.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Screen frame */
.frame{border-radius:14px;overflow:hidden;box-shadow:0 2px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,0.06);max-width:1320px;margin:0 auto}

/* ── Shared layout pieces ── */
.db{display:flex;min-height:calc(100vh - 120px)}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;padding:16px 10px;gap:1px}
.sb-head{padding:8px 10px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;letter-spacing:-0.02em}
.sb-head .ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb a{display:flex;align-items:center;gap:9px;padding:7px 10px;font-size:12.5px;font-weight:500;text-decoration:none;transition:all .15s}
.mn{flex:1;padding:24px 28px;overflow-y:auto}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
.hdr h1{font-weight:700;letter-spacing:-0.03em}
.metrics{display:flex;gap:16px;margin-top:5px;font-size:12.5px}
.metrics .sep{opacity:.2}
.grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dy{font-size:10px;text-align:center;margin-bottom:5px;font-weight:600}
.slot{min-height:82px;padding:6px}
.chip{font-size:10.5px;padding:3px 7px;margin-bottom:3px;font-weight:550}
.actions{display:flex;flex-direction:column;gap:5px}
.aitem{display:flex;align-items:center;gap:10px;padding:10px 12px}
.aitem .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.aitem .ref{font-size:12px;font-weight:600}
.aitem .sub{font-size:11px;opacity:.55}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══ VERCEL ═══ */
.t-vercel{font-family:'Geist',system-ui,sans-serif;background:#fafafa;color:#0a0a0a}
.t-vercel .sb{background:#fff;border-right:1px solid #eaeaea}
.t-vercel .sb a{border-radius:6px;color:#666}.t-vercel .sb a.on{background:#fafafa;color:#000;font-weight:600}
.t-vercel .hdr h1{font-size:20px}
.t-vercel .btn{background:#000;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.t-vercel .slot{background:#fff;border:1px solid #eee;border-radius:6px}
.t-vercel .chip{border-radius:4px}
.t-vercel .card{background:#fff;border:1px solid #eaeaea;border-radius:8px}
.t-vercel .aitem{border-radius:6px}.t-vercel .aitem:hover{background:#f5f5f5}
.t-vercel .sb-head .ico{border-radius:6px;background:#000}
.t-vercel .today-badge{background:#000;color:#fff;border-radius:4px;padding:1px 0}
.t-vercel .slot-today{border-color:#000}

/* ═══ TWITTER ═══ */
.t-twitter{font-family:'Open Sans',sans-serif;background:#fff;color:#0f1419}
.t-twitter .sb{background:#fff;border-right:1px solid #eff3f4}
.t-twitter .sb a{border-radius:22px;color:#536471}.t-twitter .sb a.on{background:rgba(29,155,240,.08);color:#1d9bf0;font-weight:700}
.t-twitter .hdr h1{font-size:21px}
.t-twitter .btn{background:#1d9bf0;color:#fff;border:none;padding:8px 18px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;box-shadow:0 2px 8px rgba(29,155,240,.25)}
.t-twitter .slot{background:#f7f9f9;border:1px solid #eff3f4;border-radius:16px}
.t-twitter .chip{border-radius:12px}
.t-twitter .card{background:#fff;border:1px solid #eff3f4;border-radius:20px}
.t-twitter .aitem{border-radius:16px}.t-twitter .aitem:hover{background:#f7f9f9}
.t-twitter .sb-head .ico{border-radius:12px;background:#1d9bf0}
.t-twitter .today-badge{background:#1d9bf0;color:#fff;border-radius:14px;padding:2px 0}
.t-twitter .slot-today{border-color:#1d9bf0;border-width:2px}

/* ═══ SUPABASE ═══ */
.t-supabase{font-family:'Outfit',sans-serif;background:#fafafa;color:#1c1c1c}
.t-supabase .sb{background:#1c1c1c;color:#ededed;border-right:none}
.t-supabase .sb a{border-radius:6px;color:rgba(255,255,255,.45)}.t-supabase .sb a.on{background:rgba(62,207,142,.12);color:#3ecf8e;font-weight:600}
.t-supabase .hdr h1{font-size:21px}
.t-supabase .btn{background:#3ecf8e;color:#1c1c1c;border:none;padding:7px 16px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.t-supabase .slot{background:#fff;border:1px solid #eee;border-radius:6px}
.t-supabase .chip{border-radius:4px}
.t-supabase .card{background:#fff;border:1px solid #eaeaea;border-radius:8px}
.t-supabase .aitem{border-radius:6px}.t-supabase .aitem:hover{background:#f5f5f5}
.t-supabase .sb-head{color:#fff}.t-supabase .sb-head .ico{border-radius:8px;background:#3ecf8e}
.t-supabase .today-badge{background:#3ecf8e;color:#1c1c1c;border-radius:4px;padding:1px 0}
.t-supabase .slot-today{border-color:#3ecf8e}

/* ═══ CLAUDE ═══ */
.t-claude{font-family:system-ui,-apple-system,sans-serif;background:#f5f0e8;color:#2c2418}
.t-claude .sb{background:#faf6ef;border-right:1px solid #e8dfd0}
.t-claude .sb a{border-radius:8px;color:#8c7a60}.t-claude .sb a.on{background:rgba(207,126,60,.1);color:#cf7e3c;font-weight:600}
.t-claude .hdr h1{font-size:21px}
.t-claude .btn{background:#cf7e3c;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.t-claude .slot{background:#faf6ef;border:1px solid #e8dfd0;border-radius:8px}
.t-claude .chip{border-radius:6px}
.t-claude .card{background:#faf6ef;border:1px solid #e8dfd0;border-radius:10px}
.t-claude .aitem{border-radius:8px}.t-claude .aitem:hover{background:rgba(207,126,60,.05)}
.t-claude .sb-head .ico{border-radius:8px;background:#cf7e3c}
.t-claude .today-badge{background:#cf7e3c;color:#fff;border-radius:6px;padding:1px 0}
.t-claude .slot-today{border-color:#cf7e3c}
.t-claude .metrics .accent{color:#cf7e3c}

/* ═══ CATPPUCCIN ═══ */
.t-catppuccin{font-family:'Montserrat',sans-serif;background:#eff1f5;color:#4c4f69}
.t-catppuccin .sb{background:#e6e9ef;border-right:1px solid #dce0e8}
.t-catppuccin .sb a{border-radius:5px;color:#7c7f93}.t-catppuccin .sb a.on{background:rgba(136,57,239,.1);color:#8839ef;font-weight:600}
.t-catppuccin .hdr h1{font-size:20px;color:#4c4f69}
.t-catppuccin .btn{background:#8839ef;color:#fff;border:none;padding:7px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.t-catppuccin .slot{background:#fff;border:1px solid #dce0e8;border-radius:5px}
.t-catppuccin .chip{border-radius:4px}
.t-catppuccin .card{background:#fff;border:1px solid #dce0e8;border-radius:6px}
.t-catppuccin .aitem{border-radius:5px}.t-catppuccin .aitem:hover{background:rgba(136,57,239,.04)}
.t-catppuccin .sb-head .ico{border-radius:5px;background:#8839ef}
.t-catppuccin .today-badge{background:#8839ef;color:#fff;border-radius:4px;padding:1px 0}
.t-catppuccin .slot-today{border-color:#8839ef}

/* ═══ MONO ═══ */
.t-mono{font-family:'Geist Mono',monospace;background:#fff;color:#111}
.t-mono .sb{background:#111;color:#aaa;border-right:none}
.t-mono .sb a{border-radius:0;color:#666;font-size:12px;border-left:2px solid transparent;padding-left:12px}.t-mono .sb a.on{color:#fff;border-left-color:#fff;background:rgba(255,255,255,.04);font-weight:500}
.t-mono .hdr h1{font-size:18px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.t-mono .btn{background:#111;color:#fff;border:none;padding:7px 14px;border-radius:0;font-size:11.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.t-mono .slot{background:#fafafa;border:1px solid #e0e0e0;border-radius:0}
.t-mono .chip{border-radius:0;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.02em}
.t-mono .card{background:#fff;border:1px solid #e0e0e0;border-radius:0}
.t-mono .aitem{border-radius:0;border-bottom:1px solid #f0f0f0}.t-mono .aitem:last-child{border:none}.t-mono .aitem:hover{background:#fafafa}
.t-mono .sb-head{font-weight:500;letter-spacing:.06em;font-size:12px;text-transform:uppercase}.t-mono .sb-head .ico{border-radius:0;background:#555}
.t-mono .today-badge{background:#111;color:#fff;border-radius:0;padding:1px 0;font-weight:500}
.t-mono .slot-today{border-color:#111;border-width:2px}
.t-mono .metrics{font-size:11.5px;letter-spacing:.02em}
.t-mono .dot{border-radius:0 !important}
</style>
</head>
<body>

<!-- Shell bar -->
<div class="shell-bar">
  <div class="shell-logo">
    <div class="ico"><i class="ph-fill ph-buildings" style="font-size:13px;color:#fff"></i></div>
    Dashboard Proposals
  </div>
  <button class="pill on" onclick="go(0,this)"><span class="sw" style="background:#000"></span>Vercel</button>
  <button class="pill" onclick="go(1,this)"><span class="sw" style="background:#1d9bf0"></span>Twitter</button>
  <button class="pill" onclick="go(2,this)"><span class="sw" style="background:#3ecf8e"></span>Supabase</button>
  <button class="pill" onclick="go(3,this)"><span class="sw" style="background:#cf7e3c"></span>Claude</button>
  <button class="pill" onclick="go(4,this)"><span class="sw" style="background:#8839ef"></span>Catppuccin</button>
  <button class="pill" onclick="go(5,this)"><span class="sw" style="background:#555"></span>Mono</button>
</div>

<script>
const T=[
  {cls:'t-vercel',ent:'#dbeafe',entC:'#1e40af',sor:'#dcfce7',sorC:'#166534',inv:'#fef9c3',invC:'#854d0e',warn:'#f59e0b'},
  {cls:'t-twitter',ent:'#e8f4fd',entC:'#1d9bf0',sor:'#d1fae5',sorC:'#059669',inv:'#fef3c7',invC:'#d97706',warn:'#ff8a00'},
  {cls:'t-supabase',ent:'#d1fae5',entC:'#059669',sor:'#fef3c7',sorC:'#d97706',inv:'#e0e7ff',invC:'#4f46e5',warn:'#f59e0b'},
  {cls:'t-claude',ent:'#e6ddd0',entC:'#8b6914',sor:'#d5e8d4',sorC:'#3d7a3b',inv:'#dde4f0',invC:'#4a6fa5',warn:'#cf7e3c'},
  {cls:'t-catppuccin',ent:'#dce0e8',entC:'#7287fd',sor:'#d5e0d5',sorC:'#40a02b',inv:'#e8dce0',invC:'#dd7878',warn:'#fe640b'},
  {cls:'t-mono',ent:'#eee',entC:'#333',sor:'#e0e0e0',sorC:'#555',inv:'#f0f0f0',invC:'#666',warn:'#888'},
];
const actions=[
  {ref:'M-2026-0012',loc:'Appt 302',msg:'Technicien à assigner'},
  {ref:'M-2026-0015',loc:'Bureau 4A',msg:'Invitation en attente'},
  {ref:'M-2026-0018',loc:'Maison Dupont',msg:'RDV à confirmer'},
  {ref:'M-2026-0019',loc:'Résidence Lilas',msg:'Clés à déposer'},
  {ref:'M-2026-0020',loc:'Studio Hugo',msg:'Invitation refusée'},
];
const days=[
  {d:'LUN 7',chips:[{t:'09:00 Entrée',k:'ent'},{t:'14:00 Sortie',k:'sor'}]},
  {d:'MAR 8',chips:[{t:'10:00 Inventaire',k:'inv'}]},
  {d:'MER 9',chips:[{t:'09:30 Entrée',k:'ent'},{t:'11:00 Entrée',k:'ent'},{t:'15:00 Sortie',k:'sor'}]},
  {d:'JEU 10',chips:[{t:'08:30 Inventaire',k:'inv'},{t:'14:00 Entrée',k:'ent'}]},
  {d:'VEN 11',chips:[{t:'09:00 Entrée',k:'ent'},{t:'11:00 Sortie',k:'sor'},{t:'14:00 Entrée',k:'ent'},{t:'16:00 Inv.',k:'inv'}],today:true},
  {d:'SAM 12',chips:[]},
  {d:'DIM 13',chips:[]},
];

function mkPanel(i){
  const t=T[i];
  let cal='';
  days.forEach(day=>{
    const isToday=day.today;
    const dyClass=isToday?'dy today-badge':'dy';
    const slotClass=isToday?'slot slot-today':'slot';
    let chips='';
    if(day.chips.length===0) chips='<div style="text-align:center;padding:22px 0;opacity:.2;font-size:10px">—</div>';
    else day.chips.forEach(c=>{
      const bg=t[c.k],fg=t[c.k+'C'];
      chips+=`<div class="chip" style="background:${bg};color:${fg}">${c.t}</div>`;
    });
    cal+=`<div><div class="${dyClass}" style="opacity:${day.chips.length?1:.35}">${day.d}</div><div class="${slotClass}">${chips}</div></div>`;
  });

  let acts='';
  actions.forEach(a=>{
    acts+=`<div class="aitem"><div class="dot" style="background:${t.warn}"></div><div style="flex:1;min-width:0"><div class="ref truncate">${a.ref} — ${a.loc}</div><div class="sub">${a.msg}</div></div></div>`;
  });

  return `
  <div class="frame">
    <div class="db ${t.cls}">
      <div class="sb">
        <div class="sb-head"><div class="ico"><i class="ph-fill ph-buildings" style="font-size:14px;color:#fff"></i></div><span>ImmoChecker</span></div>
        <a class="on"><i class="ph ph-squares-four" style="font-size:15px"></i> Tableau de bord</a>
        <a><i class="ph ph-clipboard-text" style="font-size:15px"></i> Missions</a>
        <a><i class="ph ph-building-office" style="font-size:15px"></i> Parc immobilier</a>
        <a><i class="ph ph-users-three" style="font-size:15px"></i> Tiers</a>
        <div style="flex:1"></div>
        <a style="opacity:.5"><i class="ph ph-gear" style="font-size:15px"></i> Paramètres</a>
      </div>
      <div class="mn">
        <div class="hdr">
          <div>
            <h1>Tableau de bord</h1>
            <div class="metrics">
              <span>12 missions</span><span class="sep">|</span>
              <span class="accent" style="font-weight:600">5 en attente</span><span class="sep">|</span>
              <span>8 à venir</span><span class="sep">|</span>
              <span>156 terminées</span>
            </div>
          </div>
          <button class="btn"><i class="ph ph-plus" style="font-size:13px"></i> Nouvelle mission</button>
        </div>

        <div style="font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;opacity:.7">
          <i class="ph ph-calendar-dots" style="font-size:15px"></i> Semaine du 7 au 13 avril
        </div>

        <div style="display:grid;grid-template-columns:1fr 260px;gap:14px">
          <div class="grid7">${cal}</div>
          <div>
            <div style="font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px">
              <i class="ph ph-warning-circle" style="font-size:14px;color:${t.warn}"></i> Actions en attente
              <span style="background:${t.warn};color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700">5</span>
            </div>
            <div class="card actions">${acts}</div>
          </div>
        </div>

        <div style="font-size:11px;opacity:.3;margin-top:20px;text-align:center">Vendredi 11 avril 2026 — Flat Checker</div>
      </div>
    </div>
  </div>`;
}

// Build panels
const container=document.createElement('div');
T.forEach((_,i)=>{
  const p=document.createElement('div');
  p.className='panel'+(i===0?' on':'');
  p.innerHTML=mkPanel(i);
  container.appendChild(p);
});
document.body.appendChild(container);

function go(i,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));
  container.children[i].classList.add('on');
  btn.classList.add('on');
}
</script>
</body>
</html>
