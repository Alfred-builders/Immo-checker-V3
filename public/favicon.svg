  <rect x="19.5" y="14.5" width="1.8" height="1.5" rx="0.4" fill="#1a3344" fill-opacity="0.5"/>
  <rect x="22.2" y="14.5" width="1.8" height="1.5" rx="0.4" fill="#1a3344" fill-opacity="0.5"/>
  <rect x="19.5" y="17.5" width="1.8" height="1.5" rx="0.4" fill="#1a3344" fill-opacity="0.5"/>
