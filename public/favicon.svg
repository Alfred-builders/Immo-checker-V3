  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Modern minimal building silhouette -->
  <rect x="7" y="13" width="7.5" height="13" rx="1.2" fill="white" fill-opacity="0.92"/>
  <rect x="17.5" y="6" width="7.5" height="20" rx="1.2" fill="white"/>
