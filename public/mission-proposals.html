<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoChecker — Fiche Mission — Design Proposals</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Nunito Sans','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
<script src="https://unpkg.com/@phosphor-icons/web@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07070a;color:#fff;font-family:'Nunito Sans',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}

.shell{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;backdrop-filter:blur(24px) saturate(1.6);background:rgba(7,7,10,.78);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 28px;gap:8px}
.shell-brand{font-weight:700;font-size:14px;letter-spacing:-.03em;display:flex;align-items:center;gap:10px;margin-right:20px}
.shell-brand .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#2d526c,#3a6d8e);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.sep{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 8px}
.label{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.06em;text-transform:uppercase;font-weight:700;margin-right:6px}
.tab-group{display:flex;gap:3px;padding:3px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04)}
.tab{height:34px;padding:0 16px;border:none;background:transparent;color:rgba(255,255,255,.3);font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .25s;font-family:inherit;display:flex;align-items:center;gap:8px;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.5);background:rgba(255,255,255,.03)}
.tab.on{color:#fff;background:rgba(255,255,255,.1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tab .dot{width:7px;height:7px;border-radius:2.5px;flex-shrink:0}

.pane{display:none;padding:72px 24px 32px;animation:up .45s cubic-bezier(.16,1,.3,1)}
.pane.on{display:block}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.frame{border-radius:16px;overflow:hidden;box-shadow:0 4px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);max-width:1440px;margin:0 auto;position:relative;background:#f8f9fb}
.frame::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08) 30%,rgba(255,255,255,.08) 70%,transparent);z-index:1}

/* Inner layout */
.inner{font-family:'Nunito Sans',sans-serif;color:#1a1a2e;min-height:780px;display:flex}
.sb{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #f0f0f3;padding:14px 8px;display:flex;flex-direction:column;gap:1px}
.sb-h{padding:6px 10px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
.sb-h .ico{width:26px;height:26px;border-radius:7px;background:#2d526c;display:flex;align-items:center;justify-content:center}
.sb-sec{padding:0 10px;margin-top:14px;margin-bottom:4px;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:#b0b4c0}
.sb a{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;font-weight:500;text-decoration:none;color:#8b8fa4;border-radius:7px;cursor:pointer;transition:.15s}
.sb a:hover{background:rgba(45,82,108,.04);color:#5b6178}
.sb a.on{background:rgba(45,82,108,.07);color:#2d526c;font-weight:600}
.sb a i{font-size:15px;width:16px;text-align:center}
.main{flex:1;padding:28px 32px;overflow-y:auto;background:#f8f9fb}

/* Shared */
.card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 20px rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.04)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:650;line-height:1.6}
.pill-sm{padding:2px 8px;font-size:10px;border-radius:16px}
.pill-blue{background:#dbeafe;color:#1d4ed8}.pill-green{background:#dcfce7;color:#15803d}.pill-amber{background:#fef3c7;color:#b45309}
.pill-red{background:#fee2e2;color:#dc2626}.pill-sky{background:#e0f2fe;color:#0369a1}.pill-violet{background:#ede9fe;color:#6d28d9}
.pill-slate{background:#f1f5f9;color:#475569}.pill-orange{background:#ffedd5;color:#c2410c}
.avatar{display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn-primary{background:#2d526c;color:#fff;box-shadow:0 2px 6px rgba(45,82,108,.15)}.btn-primary:hover{background:#234560}
.btn-outline{background:#fff;color:#475569;border:1px solid #e2e4e8;box-shadow:0 1px 2px rgba(0,0,0,.03)}.btn-outline:hover{border-color:#c0c4d0}
.btn-destructive{background:#fff;color:#dc2626;border:1px solid rgba(220,38,38,.2)}.btn-destructive:hover{background:#fef2f2}

.sec-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:14px}
.sec-title i{font-size:17px;color:#8b8fa4}

.field-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f8}
.field-row:last-child{border-bottom:none}
.field-label{font-size:13px;color:#8b8fa4;font-weight:500}
.field-value{font-size:14px;font-weight:600;color:#1a1a2e}

.person-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.person-row:not(:last-child){border-bottom:1px solid #f5f5f8}

/* Timeline */
.tl{position:relative;padding-left:28px}
.tl::before{content:'';position:absolute;left:8px;top:10px;bottom:10px;width:2px;background:#e8eaef;border-radius:1px}
.tl-item{position:relative;padding-bottom:24px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-24px;top:3px;width:14px;height:14px;border-radius:50%;border:2.5px solid #fff}
.tl-title{font-size:14px;font-weight:600;color:#1a1a2e}
.tl-desc{font-size:12px;color:#8b8fa4;margin-top:3px}
.tl-muted .tl-title{color:#b0b4c0}.tl-muted .tl-desc{color:#d0d4dc}

/* EDL Card */
.edl-card{padding:16px 18px;border-radius:14px;border:1px solid}
.edl-signed{background:#f0fdf4;border-color:#bbf7d0}
.edl-draft{background:#f8fafc;border-color:#e2e8f0}
.edl-links{display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06);padding-top:10px;margin-top:10px}
.edl-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 14px;background:#fff;border-radius:8px;border:1px solid #e2e4e8;color:#475569;cursor:pointer;transition:.15s;text-decoration:none}
.edl-link:hover{border-color:#b0b4c0;color:#1a1a2e}

/* Cle Row */
.cle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:12px}
.cle-normal{background:#f8f9fb}
.cle-pending{background:#fffbeb;border:1px solid #fde68a}
.cle-status{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:650}

/* Banner */
.banner{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500}
.banner-amber{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.banner-red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.banner-orange{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412}
</style>
</head>
<body>

<div class="shell">
  <div class="shell-brand"><div class="logo"><i class="ph-fill ph-buildings" style="font-size:13px"></i></div>ImmoChecker</div>
  <div class="sep"></div>
  <span class="label">Mission Detail</span>
  <div class="tab-group">
    <button class="tab on" onclick="sw(0,this)"><span class="dot" style="background:#2d526c"></span>A — Timeline 3-Col</button>
    <button class="tab" onclick="sw(1,this)"><span class="dot" style="background:#3b82f6"></span>B — Hero + 2-Col</button>
    <button class="tab" onclick="sw(2,this)"><span class="dot" style="background:#0d9488"></span>C — Wide Split</button>
  </div>
</div>

<div id="root"></div>

/* ═══ INIT ═══ */
const panels = [proposalA, proposalB, proposalC];
const root = document.getElementById('root');
panels.forEach((fn, i) => {
  const p = document.createElement('div');
  p.className = 'pane' + (i === 0 ? ' on' : '');
  p.innerHTML = fn();
  root.appendChild(p);
});

function sw(idx, btn) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  root.children[idx].classList.add('on');
  btn.classList.add('on');
}
</script>
